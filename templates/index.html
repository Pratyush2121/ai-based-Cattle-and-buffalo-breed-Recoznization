<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cattle Breed Recognition | गोवंश नस्ल पहचान</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            background-color: #ffffff;
            padding: 40px 50px;
            border-radius: 15px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            text-align: center;
            max-width: 650px;
            width: 100%;
        }
        h1 {
            color: #4CAF50;
            margin-bottom: 15px;
        }
        p {
            font-size: 1rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .upload-form {
            margin-bottom: 25px;
        }
        .file-input-container {
            position: relative;
            overflow: hidden;
            display: inline-block;
            margin-bottom: 20px;
        }
        .file-input {
            border: 2px solid #4CAF50;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s;
            display: block;
        }
        input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }
        .submit-btn {
            background-color: #4CAF50;
            color: white;
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        .submit-btn:hover {
            background-color: #45a049;
        }
        #preview {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 20px;
            border: 1px solid #ddd;
            display: none;
        }
        .result {
            margin-top: 25px;
            font-size: 1.2rem;
            font-weight: 600;
        }
        .result span {
            color: #4CAF50;
        }
        /* Responsive text for mobile */
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            .file-input {
                padding: 10px 20px;
            }
            .submit-btn {
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cattle Breed Recognition | गोवंश नस्ल पहचान</h1>
        <p>Upload an image of a cattle to get its breed recognized.<br>
           एक गाय का फोटो अपलोड करें और उसकी नस्ल पहचानें।</p>
        
        <form action="/" method="post" enctype="multipart/form-data" class="upload-form">
            <div class="file-input-container">
                <span class="file-input" id="file-name">Choose File | फ़ाइल चुनें</span>
                <input type="file" name="file" id="file-upload" accept="image/*" required>
            </div>
            <br>
            <button type="submit" class="submit-btn">Recognize Breed | नस्ल पहचानें</button>
        </form>

        {% if image_path %}
            <div class="result-section">
                <img id="preview" src="{{ image_path }}" alt="Uploaded Image Preview" style="display:block;">
                <div class="result">
                    Prediction | अनुमान: <span>{{ prediction }}</span>
                </div>
            </div>
        {% else %}
            <div class="result-section">
                <img id="preview" src="#" alt="Uploaded Image Preview">
                <div class="result" style="display:none;">
                    Prediction | अनुमान: <span id="prediction-text"></span>
                </div>
            </div>
        {% endif %}

        <script>
            const fileInput = document.getElementById('file-upload');
            const fileNameSpan = document.getElementById('file-name');
            const preview = document.getElementById('preview');

            fileInput.addEventListener('change', (event) => {
                const file = event.target.files[0];
                if (file) {
                    fileNameSpan.textContent = file.name;
                    preview.src = URL.createObjectURL(file);
                    preview.style.display = 'block';
                }
            });
        </script>
    </div>
</body>
</html>
